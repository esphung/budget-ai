name: TestFlight

on:
    workflow_dispatch:
    push:
        branches:
            - main

defaults:
    run:
        shell: bash

env:
    IOS_WORKSPACE: ios/BudgetAI.xcworkspace
    IOS_SCHEME: BudgetAIRelease
    IOS_CONFIGURATION: Release
    IOS_BUNDLE_ID: com.phung.budget-ai
    APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '5L5HNZENM9' }}
    ARCHIVE_PATH: ${{ github.workspace }}/build/BudgetAI.xcarchive
    EXPORT_PATH: ${{ github.workspace }}/build/export
    IPA_PATH: ${{ github.workspace }}/build/export/BudgetAI.ipa

jobs:
    upload-testflight:
        name: Build and Upload to TestFlight
        runs-on: macos-26
        timeout-minutes: 60

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest-stable

            - name: Print Xcode version
              run: |
                  xcodebuild -version
                  xcodebuild -showsdks

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.11.0
                  cache: yarn

            - name: Enable Corepack
              run: corepack enable

            - name: Install JavaScript dependencies
              run: yarn install --immutable

            - name: Install Ruby dependencies
              run: bundle install

            - name: Install CocoaPods dependencies
              run: bundle exec pod install --project-directory=ios

            - name: Import Apple signing certificate
              env:
                  IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
                  IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  set -euo pipefail

                  CERTIFICATE_PATH="$RUNNER_TEMP/ios_distribution.p12"
                  KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

                  printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

                  if ! openssl pkcs12 -in "$CERTIFICATE_PATH" -nokeys -passin "pass:$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" >/dev/null 2>&1 && \
                     ! openssl pkcs12 -legacy -in "$CERTIFICATE_PATH" -nokeys -passin "pass:$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" >/dev/null 2>&1; then
                      echo "::error::IOS_DISTRIBUTION_CERTIFICATE_BASE64 must be a base64-encoded .p12 file, and IOS_DISTRIBUTION_CERTIFICATE_PASSWORD must match the .p12 export password."
                      exit 1
                  fi

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security import "$CERTIFICATE_PATH" \
                      -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
                      -A \
                      -t cert \
                      -f pkcs12 \
                      -k "$KEYCHAIN_PATH"
                  security list-keychain -d user -s "$KEYCHAIN_PATH"
                  security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            - name: Install provisioning profile
              id: provisioning-profile
              env:
                  IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
              run: |
                  set -euo pipefail

                  PROFILE_PATH="$RUNNER_TEMP/app_store.mobileprovision"
                  PROFILE_PLIST="$RUNNER_TEMP/app_store_profile.plist"

                  if [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
                      echo "::error::IOS_PROVISIONING_PROFILE_BASE64 is empty. Add a base64-encoded App Store provisioning profile as a GitHub Actions secret."
                      exit 1
                  fi

                  printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
                  security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

                  PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "$PROFILE_PLIST")
                  PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "$PROFILE_PLIST")

                  mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
                  cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

                  echo "uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
                  echo "name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

            - name: Create export options
              env:
                  PROVISIONING_PROFILE_NAME: ${{ steps.provisioning-profile.outputs.name }}
              run: |
                  set -euo pipefail

                  mkdir -p build
                  cat > build/ExportOptions.plist << PLIST
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                      <key>method</key>
                      <string>app-store-connect</string>
                      <key>signingStyle</key>
                      <string>manual</string>
                      <key>teamID</key>
                      <string>${APPLE_TEAM_ID}</string>
                      <key>provisioningProfiles</key>
                      <dict>
                          <key>${IOS_BUNDLE_ID}</key>
                          <string>${PROVISIONING_PROFILE_NAME}</string>
                      </dict>
                      <key>destination</key>
                      <string>export</string>
                      <key>stripSwiftSymbols</key>
                      <true/>
                      <key>uploadSymbols</key>
                      <true/>
                  </dict>
                  </plist>
                  PLIST

            - name: Archive iOS app
              env:
                  PROVISIONING_PROFILE_NAME: ${{ steps.provisioning-profile.outputs.name }}
              run: |
                  set -euo pipefail

                  xcodebuild archive \
                      -workspace "$IOS_WORKSPACE" \
                      -scheme "$IOS_SCHEME" \
                      -configuration "$IOS_CONFIGURATION" \
                      -destination "generic/platform=iOS" \
                      -archivePath "$ARCHIVE_PATH" \
                      DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
                      CODE_SIGN_STYLE=Manual \
                      CODE_SIGN_IDENTITY="Apple Distribution" \
                      PROVISIONING_PROFILE_SPECIFIER="$PROVISIONING_PROFILE_NAME"

            - name: Export IPA
              run: |
                  set -euo pipefail

                  xcodebuild -exportArchive \
                      -archivePath "$ARCHIVE_PATH" \
                      -exportPath "$EXPORT_PATH" \
                      -exportOptionsPlist build/ExportOptions.plist

            - name: Upload IPA artifact
              uses: actions/upload-artifact@v4
              with:
                  name: BudgetAI-TestFlight-IPA
                  path: ${{ env.IPA_PATH }}
                  if-no-files-found: error

            - name: Upload dSYM artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: BudgetAI-dSYMs
                  path: ${{ env.ARCHIVE_PATH }}/dSYMs
                  if-no-files-found: warn

            - name: Upload to TestFlight
              env:
                  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
                  APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
                  APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
              run: |
                  set -euo pipefail

                  mkdir -p "$HOME/.appstoreconnect/private_keys"
                  echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

                  xcrun altool --upload-app \
                      --type ios \
                      --file "$IPA_PATH" \
                      --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
                      --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID"
